name: daily-data-refresh

# Re-collect the full 999-repo dataset every day at 06:00 UTC (14:00 Taipei),
# rebuild charts + vibe + counterfactual analyses, and commit. Streamlit Cloud
# auto-rebuilds on push so the deployed dashboard shows the fresh window
# without manual work.
#
# Requires a repo secret named GH_DATA_TOKEN — a Personal Access Token with
# `public_repo` (read-only) scope. The default Actions GITHUB_TOKEN has a
# 1000/hr API limit which is too tight for ~2000 calls per run.
#
# Manual trigger (workflow_dispatch) is enabled so the first run can be
# kicked off from the Actions tab to verify the secret is wired correctly.

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write           # to commit + push the new dataset

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90     # collect_all takes ~40 min uncached; ~5 min cached
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      # Cache the raw per-repo language + topic JSON dumps across runs.
      # collect_all is idempotent — it skips files that already exist on disk,
      # so a warm cache means only the day's *new* repos hit the API.
      # Expected speedup: ~40 min uncached → ~5 min cached (most repos
      # carry over day-to-day in the 30-day window).
      #
      # Key changes every day so we save a fresh cache; restore-keys picks
      # the most recent prefix match so we don't start cold.
      # The manifest tracks per-repo `pushed_at` vs fetched_at so stale-aware
      # incremental refresh works across runs. Without it, every run would
      # forget when each cache file was fetched and fall back to mtime.
      - name: restore raw collection cache
        uses: actions/cache@v4
        with:
          path: |
            data/raw/languages
            data/raw/topics
            data/raw/_cache_manifest.json
          key: raw-collection-${{ github.run_id }}
          restore-keys: |
            raw-collection-

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: collect (search + per-repo languages + topics)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_DATA_TOKEN }}
        run: python -m src.collect_all

      - name: build charts + summary
        run: python -m src.build_charts

      - name: vibe analysis
        run: python -m src.analyze_vibe

      - name: counterfactual robustness check
        run: python -m src.analyze_counterfactual

      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/repos.csv \
                  data/processed/repo_languages.csv \
                  data/processed/repo_topics.csv \
                  data/processed/vibe_scores.csv \
                  data/processed/_collection_progress.json \
                  outputs/figures/*.png \
                  outputs/summary_stats.md \
                  outputs/vibe_coding_analysis.md \
                  outputs/counterfactual.md
          if git diff --staged --quiet; then
            echo "No data changes today — skipping commit."
          else
            git commit -m "data: daily refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
