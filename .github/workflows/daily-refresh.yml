name: daily-data-refresh

# Re-collect the full 999-repo dataset every day at 06:00 UTC (14:00 Taipei),
# rebuild charts + vibe analysis, and commit. Streamlit Cloud auto-rebuilds
# on push and the deployed dashboard shows the fresh window without manual work.
#
# Requires a repo secret named GH_DATA_TOKEN — a Personal Access Token with
# `public_repo` (read-only) scope. The default Actions GITHUB_TOKEN has a
# 1000/hr API limit which is too tight for ~2000 calls per run.
#
# Manual trigger (workflow_dispatch) is enabled so the first run can be
# kicked off from the Actions tab to verify the secret is wired correctly.

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write           # to commit + push the new dataset

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90     # collect_all takes ~40 min; leave headroom
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: collect (search + per-repo languages + topics)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_DATA_TOKEN }}
        run: python -m src.collect_all

      - name: build charts + summary
        run: python -m src.build_charts

      - name: vibe analysis
        run: python -m src.analyze_vibe

      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/repos.csv \
                  data/processed/repo_languages.csv \
                  data/processed/repo_topics.csv \
                  data/processed/vibe_scores.csv \
                  data/processed/_collection_progress.json \
                  outputs/figures/*.png \
                  outputs/summary_stats.md \
                  outputs/vibe_coding_analysis.md
          if git diff --staged --quiet; then
            echo "No data changes today — skipping commit."
          else
            git commit -m "data: daily refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
