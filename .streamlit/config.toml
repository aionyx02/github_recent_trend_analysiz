# Streamlit dashboard theme.
# Applied automatically when `streamlit run` is executed from this repo root,
# and inherited by Streamlit Community Cloud deployments.

[theme]
base = "light"
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f6f8fa"
textColor = "#0e1117"
font = "sans serif"

[browser]
gatherUsageStats = false
